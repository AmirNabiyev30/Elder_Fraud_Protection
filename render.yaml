services:
  - type: web
    name: elder-fraud-protection-api
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend run:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: MONGO_URI
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
