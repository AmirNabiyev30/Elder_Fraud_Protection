name: Build Deployment Artifact

on:
  workflow_run:
    workflows: [test]
    types: [completed]
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install frontend dependencies
        run: npm install

      - name: Set up Python
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile backend (if applicable)
        run: |
          echo "No compile step required or replace with your app command"

      - name: Build deployment zip
        run: |
          ZIP_NAME="app_deploy-${{ github.sha }}.zip"
          zip -r "$ZIP_NAME" \
            backend \
            frontend \
            package.json \
            package-lock.json \
            requirements.txt \
            .ebextensions || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-deploy-artifact
          path: app_deploy-${{ github.sha }}.zip