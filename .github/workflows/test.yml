name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend unittest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend API tests
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/elder_fraud_test
        run: python -m unittest discover -s backend/tests

  test:
    name: Jest (${{ matrix.node-version }}) + Flask
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Start Flask in background
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/elder_fraud_test
        run: nohup python -u backend/run.py > flask_log.txt 2>&1 &

      - name: Wait for Flask /api/status
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/status; then
              exit 0
            fi
            sleep 2
          done
          echo "FLASK CRASHED:"
          cat flask_log.txt
          exit 1

      - name: Unit and integration tests with coverage
        env:
          FLASK_URL: http://127.0.0.1:8000
          MONGO_URI: mongodb://127.0.0.1:27017/elder_fraud_test
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: warn

      - name: Upload Flask logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flask-logs-jest-${{ matrix.node-version }}
          path: flask_log.txt
          if-no-files-found: ignore

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Start Flask in background
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/elder_fraud_test
        run: nohup python -u backend/run.py > flask_log.txt 2>&1 &

      - name: Wait for Flask /api/status
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/status; then
              exit 0
            fi
            sleep 2
          done
          echo "FLASK CRASHED:"
          cat flask_log.txt
          exit 1

      - name: Run E2E tests
        env:
          FLASK_URL: http://127.0.0.1:8000
        run: |
          xvfb-run npx playwright test tests/e2e.test.js --reporter=github --reporter=html

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Flask logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flask-logs-e2e
          path: flask_log.txt
          if-no-files-found: ignore

  website:
    name: Website lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Vitest (CI)
        run: npm run test -- --run

      - name: Production build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder_for_ci_only
          VITE_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build
