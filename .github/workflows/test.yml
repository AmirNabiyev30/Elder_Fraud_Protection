name: Run Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Root unit/integration tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Use Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start Flask App in Background
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          nohup python -u backend/run.py > flask_log.txt 2>&1 &

      - name: Wait for Flask to start and verify
        run: |
          sleep 5
          curl -v http://127.0.0.1:5000/api/status || (echo "FLASK CRASHED:" && cat flask_log.txt && exit 1)

      - name: Run root unit/integration tests with coverage
        env:
          # Ensure we're using the right version, http vs https lol
          FLASK_URL: http://127.0.0.1:5000
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/

  extension-e2e:
    name: Chrome extension end-to-end tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Use Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install root dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start Flask App in Background
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          # nohup keeps the process running; > directs our logs (Good for debugging) 
          nohup python backend/run.py > flask_log.txt 2>&1 & 

      - name: Wait for Flask to start and verify
        run: |
          sleep 5
          curl -v http://127.0.0.1:5000/api/status || (echo "FLASK CRASHED:" && cat flask_log.txt && exit 1)

      - name: Run extension E2E tests with virtual display
        env:
          # Ensure we're using the right version, http vs https lol
          FLASK_URL: http://127.0.0.1:5000
        run: xvfb-run npm run test:e2e

      - name: Upload Flask Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flask-logs
          path: flask_log.txt

  website-tests:
    name: Website unit and integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install website dependencies
        working-directory: website/elder-fraud-protection
        run: npm install

      - name: Run website unit/integration tests
        working-directory: website/elder-fraud-protection
        run: npm test

  website-e2e:
    name: Website Playwright end-to-end tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install website dependencies
        working-directory: website/elder-fraud-protection
        run: npm install

      - name: Install Playwright browsers
        working-directory: website/elder-fraud-protection
        run: npx playwright install chromium --with-deps

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run website e2e tests
        working-directory: website/elder-fraud-protection
        run: xvfb-run npx playwright test
