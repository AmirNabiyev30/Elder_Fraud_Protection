name: Deploy to Elastic Beanstalk

on:
  workflow_run:
    workflows: [deploy]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-deploy-artifact

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload zip to S3
        run: |
          aws s3 cp app_deploy-${{ github.sha }}.zip s3://zhu0lin-flaskbb-app/

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name flaskbb \
            --source-bundle S3Bucket="zhu0lin-flaskbb-app",S3Key="app_deploy-${{ github.sha }}.zip" \
            --version-label "ver-${{ github.sha }}" \
            --description "deploy-${{ github.sha }}"

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name flaskbb-environment \
            --version-label "ver-${{ github.sha }}"